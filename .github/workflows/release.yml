name: Build Windows Release

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller pillow

      - name: Build executable
        run: |
          python -m PyInstaller --noconfirm --onefile --windowed --icon "assets/app_icon.ico" --name "FLIR Batch Parameter Editor" "flir_batch_editor.py"

      - name: Prepare release folder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          Copy-Item "dist/FLIR Batch Parameter Editor.exe" "release/FLIR Batch Parameter Editor.exe"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: flir-batch-parameter-editor-windows
          path: release/*

      - name: Attach files to GitHub release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/FLIR Batch Parameter Editor.exe
            release/README.txt
